# ======================
# DATABASE (PostgreSQL)
# ======================
spring.datasource.url=jdbc:postgresql://localhost:5432/workforce_db
spring.datasource.username=bryantferguson
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# ======================
# JPA / HIBERNATE
# ======================
spring.jpa.database=postgresql
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# ======================
# EXTERNAL API KEYS
# Empty defaults so context loads in CI / test without env vars set
# ======================
claude.api.key=${CLAUDE_API_KEY:}
adzuna.app.id=${ADZUNA_APP_ID:}
adzuna.app.key=${ADZUNA_APP_KEY:}

# ======================
# SERVER
# ======================
server.port=8080

