# ======================
# DATABASE (PostgreSQL)
# ======================
spring.datasource.url=jdbc:postgresql://localhost:5432/workforce_db
spring.datasource.username=workforce_user
spring.datasource.password=workforce_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ======================
# JPA / HIBERNATE
# ======================
spring.jpa.database=postgresql

# IMPORTANT for dev (keeps your tables synced automatically)
spring.jpa.hibernate.ddl-auto=update

# ======================
# DEBUGGING (DEV ONLY)
# ======================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Optional but helpful (prevents SQL errors on startup)
spring.jpa.open-in-view=false